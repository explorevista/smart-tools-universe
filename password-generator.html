<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Generator Pro</title>
<link rel="stylesheet" href="../style.css">

<style>
:root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #ffffff;
    --accent: #38bdf8;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: Arial;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
}

.card {
    background: var(--card);
    padding: 20px;
    border-radius: 12px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    border: none;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

.output {
    margin-top: 20px;
    padding: 15px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 10px;
    word-break: break-all;
}

.row {
    display: flex;
    gap: 10px;
}
</style>
</head>

<body>

<div class="container">

    <h1>🔐 Password Generator Pro</h1>

    <div class="card">

        <label>Password Length</label>
        <input type="number" id="length" value="12" min="6" max="64">

        <button onclick="generate()">Generate Password</button>
        <button onclick="copyPassword()">Copy Password</button>

        <div class="output" id="output">Your password will appear here</div>

    </div>

</div>

<script>

let currentPassword = "";

/* REAL PASSWORD GENERATOR */
function generate() {

    let length = document.getElementById("length").value;

    let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+";

    let password = "";

    for (let i = 0; i < length; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
    }

    currentPassword = password;

    document.getElementById("output").innerText = password;
}

/* COPY FUNCTION */
function copyPassword() {
    navigator.clipboard.writeText(currentPassword);
    alert("Password copied!");
}

</script>

</body>
</html>
