<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Tools Universe</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    background: #1e293b;
}

input {
    padding: 10px;
    width: 60%;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

.filter-bar {
    text-align: center;
    margin-top: 10px;
}

.filter-bar button {
    margin: 5px;
    padding: 8px 12px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    background: #334155;
    color: white;
}

.tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

.tool-card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.tool-card:hover {
    background: #334155;
    transform: scale(1.03);
}

.tool-card h3 {
    color: #38bdf8;
    margin: 0;
}

.tool-card small {
    color: #94a3b8;
}
</style>

</head>

<body>

<header>
    <h1>🚀 Smart Tools Universe</h1>
    <p>AI SaaS Tool Ecosystem</p>

    <!-- SEARCH -->
    <input type="text" id="search" placeholder="Search tools...">
</header>

<!-- FILTERS -->
<div class="filter-bar">
    <button onclick="filterCategory('all')">All</button>
    <button onclick="filterCategory('Media')">Media</button>
    <button onclick="filterCategory('Writing')">Writing</button>
    <button onclick="filterCategory('Utility')">Utility</button>
    <button onclick="filterCategory('Productivity')">Productivity</button>
</div>

<!-- TOOLS -->
<div class="tools-grid"></div>

<!-- SCRIPTS -->
<script src="tools-data.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
