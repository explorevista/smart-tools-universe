<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Tools Universe</title>
<link rel="stylesheet" href="style.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    background: #1e293b;
}

.tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

.tool-card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.tool-card:hover {
    background: #334155;
    transform: scale(1.03);
}

.tool-card h3 {
    margin: 0;
    color: #38bdf8;
}

.tool-card small {
    color: #94a3b8;
}
</style>
</head>

<body>

<header>
    <h1>🚀 Smart Tools Universe</h1>
    <p>All-in-One AI SaaS Tool Ecosystem</p>
</header>

<div class="tools-grid">
    <!-- AUTO GENERATED BY dashboard.js -->
</div>

<!-- 🔥 IMPORTANT SCRIPTS -->
<script src="tools-data.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
