<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GIF Creator Pro</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

input, button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

button{
    background:#38bdf8;
    font-weight:bold;
    cursor:pointer;
}

.preview{
    margin-top:20px;
    padding:15px;
    background:#0f172a;
    border:1px solid #334155;
    border-radius:10px;
}

.badge{
    display:inline-block;
    padding:5px 10px;
    background:#22c55e;
    border-radius:6px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

    <h1>🎬 GIF Creator Pro <span class="badge">Media Tool</span></h1>

    <div class="card">

        <p>Upload Image / Video (Simulation UI)</p>
        <input type="file" id="fileInput">

        <button onclick="createGIF()">Create GIF</button>
        <button onclick="downloadGIF()">Download GIF</button>

    </div>

    <div class="preview" id="preview">
        No GIF created yet
    </div>

</div>

<script>

function createGIF(){
    document.getElementById("preview").innerHTML =
    "🎬 GIF Created Successfully (UI Simulation Mode)";
}

function downloadGIF(){
    alert("GIF download started (future API connect ready)");
}

</script>

</body>
</html>
