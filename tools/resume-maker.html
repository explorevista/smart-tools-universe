<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resume Maker Pro</title>
<link rel="stylesheet" href="../style.css">

<style>
:root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #ffffff;
    --muted: #94a3b8;
    --accent: #38bdf8;
}

body.light {
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #475569;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: Arial;
    transition: 0.3s;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: var(--card);
    padding: 20px;
    border-radius: 12px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #334155;
    background: transparent;
    color: var(--text);
}

button {
    padding: 10px 14px;
    margin: 5px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.primary { background: var(--accent); color: black; }
.darkbtn { background: #22c55e; }
.printbtn { background: #f59e0b; }

.preview {
    margin-top: 20px;
    padding: 20px;
    background: white;
    color: black;
    border-radius: 10px;
    display: none;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

h1 { color: var(--accent); }
</style>
</head>

<body>

<div class="container">

    <div class="topbar">
        <h1>Resume Maker Pro</h1>
        <button class="darkbtn" onclick="toggleTheme()">Toggle Theme</button>
    </div>

    <div class="card">

        <input id="name" placeholder="Full Name">
        <input id="email" placeholder="Email">
        <input id="phone" placeholder="Phone Number">
        <input id="job" placeholder="Job Title">

        <textarea id="skills" placeholder="Skills (comma separated)"></textarea>
        <textarea id="experience" placeholder="Experience"></textarea>

        <button class="primary" onclick="generate()">Generate Resume</button>
        <button class="printbtn" onclick="printResume()">Print</button>

    </div>

    <div id="preview" class="preview"></div>

</div>

<script>
/* THEME TOGGLE */
function toggleTheme() {
    document.body.classList.toggle("light");
}

/* GENERATE RESUME */
function generate() {

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let job = document.getElementById("job").value;
    let skills = document.getElementById("skills").value;
    let exp = document.getElementById("experience").value;

    document.getElementById("preview").style.display = "block";

    document.getElementById("preview").innerHTML = `
        <h2>${name}</h2>
        <p>${job}</p>
        <p>${email} | ${phone}</p>
        <hr>
        <h3>Skills</h3>
        <p>${skills}</p>
        <h3>Experience</h3>
        <p>${exp}</p>
    `;
}

/* PRINT RESUME */
function printResume() {
    let content = document.getElementById("preview").innerHTML;
    let win = window.open("", "", "width=800,height=600");
    win.document.write(content);
    win.print();
}
</script>

</body>
</html>
