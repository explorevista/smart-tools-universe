<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Meeting Assistant</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

textarea, button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

textarea{
    height:120px;
    resize:none;
}

button{
    background:#38bdf8;
    font-weight:bold;
    cursor:pointer;
}

.output{
    margin-top:20px;
    padding:15px;
    background:#0f172a;
    border:1px solid #334155;
    border-radius:10px;
}

.badge{
    display:inline-block;
    padding:5px 10px;
    background:#f59e0b;
    border-radius:6px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

    <h1>🎤 AI Meeting Assistant <span class="badge">Productivity Tool</span></h1>

    <div class="card">

        <p>Paste meeting notes or speech text below:</p>

        <textarea id="input" placeholder="Enter meeting notes..."></textarea>

        <button onclick="generateSummary()">Generate Summary</button>
        <button onclick="exportNotes()">Export Notes</button>

    </div>

    <div class="output" id="output">
        Summary will appear here...
    </div>

</div>

<script>

function generateSummary(){
    let text = document.getElementById("input").value;

    if(text.trim() === ""){
        document.getElementById("output").innerHTML = "❌ Please enter meeting text";
        return;
    }

    document.getElementById("output").innerHTML = `
        <h3>📌 Summary</h3>
        <p>${text.substring(0,150)}...</p>

        <h3>✅ Action Items</h3>
        <ul>
            <li>Review discussion points</li>
            <li>Assign tasks</li>
            <li>Schedule follow-up</li>
        </ul>
    `;
}

function exportNotes(){
    alert("Export feature ready (backend/API phase later)");
}

</script>

</body>
</html>
