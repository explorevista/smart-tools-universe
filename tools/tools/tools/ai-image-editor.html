<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Image Editor Pro</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

input, select, button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

button{
    background:#38bdf8;
    font-weight:bold;
    cursor:pointer;
}

.preview{
    margin-top:20px;
    padding:20px;
    background:#0f172a;
    border:1px solid #334155;
    border-radius:10px;
    text-align:center;
}

img{
    max-width:100%;
    border-radius:10px;
}

.badge{
    display:inline-block;
    padding:5px 10px;
    background:#a855f7;
    border-radius:6px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

    <h1>🖼️ AI Image Editor Pro <span class="badge">Media Tool</span></h1>

    <div class="card">

        <p>Upload Image:</p>
        <input type="file" id="imageInput" accept="image/*">

        <p>Select Effect:</p>
        <select id="filter">
            <option value="none">None</option>
            <option value="grayscale(100%)">Grayscale</option>
            <option value="blur(5px)">Blur</option>
            <option value="contrast(200%)">High Contrast</option>
            <option value="brightness(150%)">Bright</option>
        </select>

        <button onclick="applyEffect()">Apply Effect</button>
        <button onclick="downloadImage()">Download</button>

    </div>

    <div class="preview">
        <img id="preview" src="" alt="Preview Image">
        <p id="msg">No image uploaded yet</p>
    </div>

</div>

<script>

let imgElement = document.getElementById("preview");

document.getElementById("imageInput").addEventListener("change", function(e){
    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = function(event){
        imgElement.src = event.target.result;
        document.getElementById("msg").innerText = "";
    }

    reader.readAsDataURL(file);
});

function applyEffect(){
    let filter = document.getElementById("filter").value;
    imgElement.style.filter = filter;
}

function downloadImage(){
    alert("Download feature ready (API integration later)");
}

</script>

</body>
</html>
