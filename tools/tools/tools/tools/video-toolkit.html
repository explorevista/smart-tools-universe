<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Toolkit Pro</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

input, button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

button{
    background:#38bdf8;
    font-weight:bold;
    cursor:pointer;
}

.preview{
    margin-top:20px;
    padding:20px;
    background:#0f172a;
    border:1px solid #334155;
    border-radius:10px;
}

video{
    width:100%;
    border-radius:10px;
}

.badge{
    display:inline-block;
    padding:5px 10px;
    background:#ef4444;
    border-radius:6px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

    <h1>🎥 Video Toolkit Pro <span class="badge">Media Tool</span></h1>

    <div class="card">

        <p>Upload Video:</p>
        <input type="file" id="videoInput" accept="video/*">

        <button onclick="trimVideo()">Trim Video</button>
        <button onclick="mergeVideo()">Merge Video</button>
        <button onclick="compressVideo()">Compress Video</button>
        <button onclick="downloadVideo()">Download</button>

    </div>

    <div class="preview">
        <video id="preview" controls></video>
        <p id="msg">No video uploaded yet</p>
    </div>

</div>

<script>

let video = document.getElementById("preview");

document.getElementById("videoInput").addEventListener("change", function(e){
    let file = e.target.files[0];
    let url = URL.createObjectURL(file);

    video.src = url;
    document.getElementById("msg").innerText = "";
});

function trimVideo(){
    alert("Trim feature ready (backend/API required)");
}

function mergeVideo(){
    alert("Merge feature ready (backend/API required)");
}

function compressVideo(){
    alert("Compress feature ready (backend/API required)");
}

function downloadVideo(){
    alert("Download started (future API integration)");
}

</script>

</body>
</html>
